<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Stellar Engineering logo">
  <title>Stellar Engineering</title>
  <desc>Fictional engineering company used in ADS examples for the internal developer platform.</desc>
  <!-- Icon: star/constellation -->
  <g transform="translate(8, 12)">
    <circle cx="20" cy="20" r="18" fill="#1a1340"/>
    <!-- 4-point star -->
    <path d="M 20 6 L 22 18 L 34 20 L 22 22 L 20 34 L 18 22 L 6 20 L 18 18 Z" fill="#a78bfa"/>
    <!-- Small accent stars -->
    <circle cx="9" cy="11" r="1" fill="#fff"/>
    <circle cx="32" cy="29" r="1" fill="#fff"/>
    <circle cx="11" cy="30" r="0.8" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="34" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#1a1340">Stellar</text>
  <text x="58" y="50" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#5a6b80" letter-spacing="2.5">ENGINEERING  LTD</text>
</svg>
